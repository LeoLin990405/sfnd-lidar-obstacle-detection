name: Build and test

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Install PCL
        run: |
          sudo apt-get update
          sudo apt-get install --yes libpcl-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel 2

      - name: Test
        run: ctest --test-dir build --output-on-failure
